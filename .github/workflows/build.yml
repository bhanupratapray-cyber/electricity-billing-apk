name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java for Android
      uses: actions/setup-java@v4
      with:
        java-version: '22'
        distribution: 'temurin'

    - name: Install App Builder (Capacitor)
      run: npm install

    - name: Initialize Android Platform
      run: npx cap add android

    - name: Generate Custom App Icon & Splash Screen
      run: npx @capacitor/assets generate --assetPath ./assets --android

    - name: Sync HTML Code to Android
      run: npx cap sync android

    - name: Compile the APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Final APK
      uses: actions/upload-artifact@v4
      with:
        name: Electricity-Billing-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
